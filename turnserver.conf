# Coturn TURN Server — screenflow-ai-studio
# 服务器公网IP（通过 DETECT_EXTERNAL_IP=yes 自动检测）
# external-ip 不在此文件中设置，由 docker 环境变量处理

# 监听端口
listening-port=3478

# 服务器身份
server-name=www.emai2.cn
realm=www.emai2.cn

# TURN 用户名密码（必须设置，WebRTC TURN 需要认证）
lt-cred-mech
user=screenflow:screenflow-turn-2024

# 性能（0=无限制）
max-bps=0
bps-capacity=0

# 日志
syslog

# 禁用 TLS/DTLS（通过 Nginx TLS 代理）
no-tls
no-dtls

# 启用 fingerprint（WebRTC 兼容）
fingerprint

# CLI 禁用
no-cli