# Coturn TURN Server - screenflow-ai-studio
# The public IP is supplied by docker-compose.prod.yml via ANNOUNCED_IP.

# 监听端口
listening-port=3478

# 服务器身份
server-name=your-domain.example
realm=your-domain.example

# TURN 用户名密码（必须设置，WebRTC TURN 需要认证）
lt-cred-mech
user=screenflow:replace-with-a-strong-turn-password

# 性能（0=无限制）
max-bps=0
bps-capacity=0

# 日志
syslog

# 禁用 TLS/DTLS（通过 Nginx TLS 代理）
no-tls
no-dtls

# 启用 fingerprint（WebRTC 兼容）
fingerprint

# CLI 禁用
no-cli
