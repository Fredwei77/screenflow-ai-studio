# Nginx config for your-domain.example/meet
# This is a location block to add INSIDE your existing your-domain.example server block
# Or place this file at /etc/nginx/conf.d/meet.conf and merge into your site config

# If you have an existing server block for your-domain.example,
# add these location blocks inside it:

# --- Add inside existing server { } block for your-domain.example ---

# Socket.IO (must be before the catch-all /meet/ location)
location /meet/socket.io {
    proxy_pass http://127.0.0.1:4000/socket.io;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# App (strips /meet prefix)
location /meet/ {
    proxy_pass http://127.0.0.1:4000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
